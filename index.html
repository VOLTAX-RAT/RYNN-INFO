 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rynn Community</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);
            --text-primary: #ebebeb;
            --text-secondary: #aaa;
            --text-muted: #666;
            --accent: #7c6cfc;
            --accent-dim: rgba(124, 108, 252, 0.15);
        }

        /* ── Video Background ── */
        .video-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* dark overlay supaya teks tetap terbaca */
        .video-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        /* ── Layout ── */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            position: relative;
        }

        /* ── Card — glassmorphism ── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(10, 10, 14, 0.45);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-radius: 28px;
            padding: 36px 28px 28px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 40px 80px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: rise 0.55s cubic-bezier(.22,.68,0,1.2) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(22px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: rgba(124, 108, 252, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(124, 108, 252, 0.28);
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 0 28px rgba(124, 108, 252, 0.2);
        }

        .logo-wrap svg {
            width: 28px;
            height: 28px;
        }

        .logo-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.4px;
            line-height: 1.2;
        }

        .logo-meta {
            margin-top: 6px;
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            letter-spacing: 1.2px;
            font-weight: 400;
            text-transform: uppercase;
        }

        .logo-meta .accent { color: rgba(124, 108, 252, 0.6); }

        /* ── Section Label ── */
        .section-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.25);
            margin: 20px 0 10px 4px;
        }

        /* ── Menu ── */
        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px) saturate(140%);
            -webkit-backdrop-filter: blur(16px) saturate(140%);
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            text-decoration: none;
            color: var(--text-primary);
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.16s ease, box-shadow 0.2s ease;
            animation: rise 0.4s cubic-bezier(.22,.68,0,1.2) both;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-group .menu-item:nth-child(1) { animation-delay: 0.10s; }
        .menu-group .menu-item:nth-child(2) { animation-delay: 0.17s; }

        .menu-item:hover {
            background: rgba(255,255,255,0.10);
            border-color: rgba(255,255,255,0.16);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
        }

        .menu-item:active {
            transform: scale(0.98) translateY(0);
            box-shadow: none;
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .menu-icon {
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.18s ease;
        }

        .menu-icon svg { width: 18px; height: 18px; }

        .menu-item:hover .menu-icon { transform: scale(1.08); }

        .icon-wa   { background: rgba(37, 211, 102, 0.12); border: 1px solid rgba(37, 211, 102, 0.2); }
        .icon-tg   { background: rgba(38, 169, 224, 0.12); border: 1px solid rgba(38, 169, 224, 0.2); }
        .icon-supp { background: rgba(255, 200, 80, 0.10); border: 1px solid rgba(255, 200, 80, 0.16); }
        .icon-frnd { background: rgba(124, 108, 252, 0.12); border: 1px solid rgba(124, 108, 252, 0.2); }

        .menu-text { min-width: 0; }

        .menu-label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.92);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
            font-weight: 400;
        }

        .menu-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .badge {
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .badge-wa   { background: rgba(37, 211, 102, 0.1);  border: 1px solid rgba(37, 211, 102, 0.2);  color: rgba(37, 211, 102, 0.85); }
        .badge-tg   { background: rgba(38, 169, 224, 0.1);  border: 1px solid rgba(38, 169, 224, 0.2);  color: rgba(38, 169, 224, 0.85); }
        .badge-supp { background: rgba(255, 200, 80, 0.08); border: 1px solid rgba(255, 200, 80, 0.16); color: rgba(255, 200, 80, 0.8); }
        .badge-frnd { background: rgba(124, 108, 252, 0.1); border: 1px solid rgba(124, 108, 252, 0.2); color: rgba(124, 108, 252, 0.9); }

        .arrow {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.25);
            transition: transform 0.18s ease, color 0.18s ease;
        }

        .arrow svg { width: 16px; height: 16px; }

        .menu-item:hover .arrow {
            transform: translateX(3px);
            color: rgba(255,255,255,0.5);
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .footer-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            margin-bottom: 6px;
        }

        .footer-icon svg { width: 14px; height: 14px; }

        .footer-text {
            font-size: 11px;
            color: rgba(255,255,255,0.22);
            letter-spacing: 0.5px;
        }

        .footer-dot {
            color: rgba(124, 108, 252, 0.45);
            margin: 0 5px;
        }

        .footer-by {
            font-size: 10px;
            color: rgba(255,255,255,0.1);
            margin-top: 4px;
        }

        /* ── Responsive ── */
        @media (max-width: 400px) {
            .card { padding: 28px 16px 24px; border-radius: 22px; }
            .menu-item { padding: 12px 14px; }
            .menu-icon { width: 34px; height: 34px; }
            .menu-label { font-size: 13px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, .card, .menu-item { animation: none !important; transition: none !important; }
        }
    </style>
</head>
